  <script>
    let scene, camera, renderer, controls, transformControls;
    let currentMode = 'edit';
    let objects = [];
    let selectedObject = null;
    let raycaster, mouse;
    let patrullando = false, patrullaTween = null;

    window.addEventListener('DOMContentLoaded', () => {
      initThreeJS();
      crearPisoTienda();
      setupEventListeners();
      cargarPreset('farmacia');
    });

    function initThreeJS() {
      const container = document.getElementById('webgl-container');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b0f19);
      scene.fog = new THREE.FogExp2(0x0b0f19, 0.015);

      camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 18, 22);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      container.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 - 0.02;

      transformControls = new THREE.TransformControls(camera, renderer.domElement);
      transformControls.size = 0.85;
      transformControls.addEventListener('change', () => {
        if (selectedObject) sincronizarInspectorDesdeObjeto(selectedObject);
      });
      transformControls.addEventListener('dragging-changed', (event) => {
        controls.enabled = !event.value;
      });
      scene.add(transformControls);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0x38bdf8, 1.2);
      dirLight.position.set(15, 25, 15);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      scene.add(dirLight);

      const gridHelper = new THREE.GridHelper(40, 40, 0x38bdf8, 0x1e293b);
      gridHelper.position.y = 0.01;
      scene.add(gridHelper);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      window.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (e.key === 't' || e.key === 'T') setGizmoMode('translate');
        if (e.key === 'r' || e.key === 'R') setGizmoMode('rotate');
        if (e.key === 's' || e.key === 'S') setGizmoMode('scale');
      });

      animate();
    }

    function crearPisoTienda() {
      const floorGeo = new THREE.PlaneGeometry(40, 30);
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.4, metalness: 0.2 });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);
    }

    function animate(time) {
      requestAnimationFrame(animate);
      if (typeof TWEEN !== 'undefined') TWEEN.update(time);
      controls.update();
      renderer.render(scene, camera);
    }

    function addStructure(type) {
      if (currentMode !== 'edit') return;

      let mesh, data = { id: Date.now(), type: type, name: '', pos: [0, 0, 0] };

      if (type === 'gondola_doble') {
        const group = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(4, 2.2, 1.4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0284c7, roughness: 0.3 });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.position.y = 1.1;
        bodyMesh.castShadow = true;
        group.add(bodyMesh);
        mesh = group;
        data.name = 'Góndola ' + (objects.length + 1);
      } else if (type === 'mostrador') {
        const geo = new THREE.BoxGeometry(3, 1.2, 1.2);
        const mat = new THREE.MeshStandardMaterial({ color: 0xf59e0b, roughness: 0.3 });
        mesh = new THREE.Mesh(geo, mat);
        mesh.position.y = 0.6;
        mesh.castShadow = true;
        data.name = 'Caja Registradora ' + (objects.length + 1);
      } else if (type === 'nevera') {
        const group = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(2, 3, 1.2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.2 });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.position.y = 1.5;
        group.add(bodyMesh);

        const glassGeo = new THREE.BoxGeometry(1.8, 2.6, 0.1);
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.4 });
        const glassMesh = new THREE.Mesh(glassGeo, glassMat);
        glassMesh.position.set(0, 1.5, 0.6);
        group.add(glassMesh);

        mesh = group;
        data.name = 'Nevera Exhibidora ' + (objects.length + 1);
      } else if (type === 'wall') {
        const geo = new THREE.BoxGeometry(8, 3.5, 0.4);
        const mat = new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.6 });
        mesh = new THREE.Mesh(geo, mat);
        mesh.position.y = 1.75;
        mesh.castShadow = true;
        data.name = 'Pared ' + (objects.length + 1);
      } else if (type === 'column') {
        const geo = new THREE.CylinderGeometry(0.6, 0.6, 5, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.5 });
        mesh = new THREE.Mesh(geo, mat);
        mesh.position.y = 2.5;
        mesh.castShadow = true;
        data.name = 'Columna ' + (objects.length + 1);
      } else if (type === 'camera') {
        const group = new THREE.Group();
        const bodyGeo = new THREE.SphereGeometry(0.45, 16, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x10b981, roughness: 0.2, metalness: 0.8 });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        group.add(bodyMesh);

        const lensGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.35, 16);
        const lensMat = new THREE.MeshStandardMaterial({ color: 0x090d16 });
        const lensMesh = new THREE.Mesh(lensGeo, lensMat);
        lensMesh.rotation.x = Math.PI / 2;
        lensMesh.position.z = 0.35;
        group.add(lensMesh);

        const fov = 60, dist = 8;
        const coneGeo = new THREE.ConeGeometry(dist * Math.tan((fov * Math.PI / 180) / 2), dist, 16, 1, true);
        const coneMat = new THREE.MeshBasicMaterial({ color: 0x10b981, wireframe: true, transparent: true, opacity: 0.35 });
        const coneMesh = new THREE.Mesh(coneGeo, coneMat);
        coneMesh.rotation.x = -Math.PI / 2;
        coneMesh.position.z = dist / 2;
        coneMesh.name = 'frustumCone';
        group.add(coneMesh);

        group.position.set((Math.random() - 0.5) * 8, 4, (Math.random() - 0.5) * 8);
        mesh = group;
        data.name = 'Cámara Monitoreo ' + (objects.length + 1);
        data.fov = fov;
        data.dist = dist;
        data.imageUrl = 'https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=600&auto=format&fit=crop&q=80';
      }

      mesh.userData = data;
      scene.add(mesh);
      objects.push(mesh);
      actualizarHUD();
      seleccionarObjeto(mesh);
    }

    function setupEventListeners() {
      const container = document.getElementById('webgl-container');

      container.addEventListener('click', (event) => {
        if (transformControls.dragging) return;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / container.clientWidth) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / container.clientHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(objects, true);

        if (intersects.length > 0) {
          let rootObj = intersects[0].object;
          while (rootObj.parent && rootObj.parent !== scene) {
            rootObj = rootObj.parent;
          }
          if (currentMode === 'edit') {
            seleccionarObjeto(rootObj);
          } else if (currentMode === 'monitor') {
            if (rootObj.userData.type === 'camera') {
              abrirModalCamara(rootObj.userData);
            }
          }
        }
      });

      window.addEventListener('resize', () => {
        const width = container.clientWidth;
        const height = container.clientHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      });
    }

    function setGizmoMode(mode) {
      if (!transformControls) return;
      transformControls.setMode(mode);
      document.getElementById('gizmo-translate').classList.toggle('active', mode === 'translate');
      document.getElementById('gizmo-rotate').classList.toggle('active', mode === 'rotate');
      document.getElementById('gizmo-scale').classList.toggle('active', mode === 'scale');
    }

    function seleccionarObjeto(obj) {
      selectedObject = obj;
      transformControls.attach(obj);

      const inspector = document.getElementById('inspector-panel');
      const secCam = document.getElementById('section-camera-props');

      document.getElementById('inp-nombre').value = obj.userData.name || '';
      document.getElementById('inspector-title').innerText = 'Inspector: ' + obj.userData.type.toUpperCase();

      sincronizarInspectorDesdeObjeto(obj);

      if (obj.userData.type === 'camera') {
        secCam.style.display = 'block';
        document.getElementById('inp-fov').value = obj.userData.fov || 60;
        document.getElementById('val-fov').innerText = obj.userData.fov || 60;
        document.getElementById('inp-dist').value = obj.userData.dist || 8;
        document.getElementById('val-dist').innerText = obj.userData.dist || 8;
        document.getElementById('inp-img-url').value = obj.userData.imageUrl || '';
        document.getElementById('img-preview').src = obj.userData.imageUrl || 'https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=600&auto=format&fit=crop&q=80';
      } else {
        secCam.style.display = 'none';
      }

      inspector.classList.remove('hidden');
    }

    function sincronizarInspectorDesdeObjeto(obj) {
      document.getElementById('pos-x').value = obj.position.x.toFixed(1);
      document.getElementById('pos-y').value = obj.position.y.toFixed(1);
      document.getElementById('pos-z').value = obj.position.z.toFixed(1);
      document.getElementById('rot-y').value = Math.round((obj.rotation.y * 180 / Math.PI) % 360);
    }

    function deseleccionarObjeto() {
      selectedObject = null;
      transformControls.detach();
      document.getElementById('inspector-panel').classList.add('hidden');
    }

    function actualizarObjetoDesdeInputs() {
      if (!selectedObject) return;

      selectedObject.userData.name = document.getElementById('inp-nombre').value;
      selectedObject.position.x = parseFloat(document.getElementById('pos-x').value) || 0;
      selectedObject.position.y = parseFloat(document.getElementById('pos-y').value) || 0;
      selectedObject.position.z = parseFloat(document.getElementById('pos-z').value) || 0;
      selectedObject.rotation.y = (parseFloat(document.getElementById('rot-y').value) || 0) * Math.PI / 180;

      if (selectedObject.userData.type === 'camera') {
        const fov = parseInt(document.getElementById('inp-fov').value);
        const dist = parseInt(document.getElementById('inp-dist').value);
        const imgUrl = document.getElementById('inp-img-url').value;

        document.getElementById('val-fov').innerText = fov;
        document.getElementById('val-dist').innerText = dist;
        document.getElementById('img-preview').src = imgUrl;

        selectedObject.userData.fov = fov;
        selectedObject.userData.dist = dist;
        selectedObject.userData.imageUrl = imgUrl;

        const coneMesh = selectedObject.getObjectByName('frustumCone');
        if (coneMesh) {
          coneMesh.geometry.dispose();
          coneMesh.geometry = new THREE.ConeGeometry(dist * Math.tan((fov * Math.PI / 180) / 2), dist, 16, 1, true);
          coneMesh.position.z = dist / 2;
        }
      }
    }

    function eliminarObjetoSeleccionado() {
      if (!selectedObject) return;
      transformControls.detach();
      scene.remove(selectedObject);
      objects = objects.filter(o => o !== selectedObject);
      actualizarHUD();
      deseleccionarObjeto();
    }

    function limpiarEscena() {
      transformControls.detach();
      objects.forEach(obj => scene.remove(obj));
      objects = [];
      actualizarHUD();
      deseleccionarObjeto();
    }

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-mode-edit').classList.toggle('active', mode === 'edit');
      document.getElementById('btn-mode-monitor').classList.toggle('active', mode === 'monitor');
      document.getElementById('editor-tools').style.display = mode === 'edit' ? 'flex' : 'none';
      document.getElementById('gizmo-mode-group').style.display = mode === 'edit' ? 'flex' : 'none';
      document.getElementById('hud-mode').innerText = mode === 'edit' ? 'Edición 3D' : 'Monitoreo Vivo';
      if (mode === 'monitor') deseleccionarObjeto();
    }

    function abrirModalCamara(data) {
      document.getElementById('modal-cam-title').innerText = data.name;
      document.getElementById('modal-cam-details').innerText = `FOV: ${data.fov || 60}° | Alcance: ${data.dist || 8}m`;
      document.getElementById('modal-cam-img').src = data.imageUrl || 'https://images.unsplash.com/photo-1557597774-9d273605dfa9?w=800&auto=format&fit=crop&q=80';
      document.getElementById('camera-modal').classList.add('show');
    }

    function cerrarModalCamara() {
      document.getElementById('camera-modal').classList.remove('show');
    }

    function actualizarHUD() {
      const cams = objects.filter(o => o.userData.type === 'camera');
      document.getElementById('hud-count-obj').innerText = objects.length;
      document.getElementById('hud-count-cam').innerText = cams.length;
    }

    function cargarPreset(type) {
      limpiarEscena();
      if (type === 'farmacia') {
        // Preset Farmacia/Supermercado
        addStructure('gondola_doble'); objects[objects.length - 1].position.set(-6, 0, -4);
        addStructure('gondola_doble'); objects[objects.length - 1].position.set(2, 0, -4);
        addStructure('gondola_doble'); objects[objects.length - 1].position.set(-6, 0, 4);
        addStructure('gondola_doble'); objects[objects.length - 1].position.set(2, 0, 4);
        addStructure('mostrador'); objects[objects.length - 1].position.set(10, 0, 8);
        addStructure('nevera'); objects[objects.length - 1].position.set(-12, 0, -10);
        addStructure('nevera'); objects[objects.length - 1].position.set(-8, 0, -10);
        addStructure('camera'); objects[objects.length - 1].position.set(-14, 5, -12);
        addStructure('camera'); objects[objects.length - 1].position.set(14, 5, 10);
      } else if (type === 'express') {
        addStructure('gondola_doble'); objects[objects.length - 1].position.set(0, 0, 0);
        addStructure('mostrador'); objects[objects.length - 1].position.set(6, 0, 5);
        addStructure('nevera'); objects[objects.length - 1].position.set(-6, 0, -6);
        addStructure('camera'); objects[objects.length - 1].position.set(0, 5, 8);
      }
      deseleccionarObjeto();
      actualizarHUD();
    }

    function alternarPatrulla3D() {
      patrullando = !patrullando;
      const btn = document.getElementById('btn-patrulla');
      btn.classList.toggle('active', patrullando);

      if (patrullando) {
        const cams = objects.filter(o => o.userData.type === 'camera');
        if (cams.length === 0) {
          alert('Añade al menos una cámara para iniciar la Patrulla 3D.');
          patrullando = false;
          btn.classList.remove('active');
          return;
        }
        iniciarPatrullaCamaras(cams, 0);
      } else {
        if (patrullaTween) patrullaTween.stop();
      }
    }

    function iniciarPatrullaCamaras(cams, index) {
      if (!patrullando) return;
      const camTarget = cams[index % cams.length];
      const targetPos = {
        x: camTarget.position.x,
        y: camTarget.position.y + 1,
        z: camTarget.position.z + 4
      };

      patrullaTween = new TWEEN.Tween(camera.position)
        .to(targetPos, 3500)
        .easing(TWEEN.Easing.Quadratic.InOut)
        .onUpdate(() => controls.update())
        .onComplete(() => {
          if (patrullando) {
            setTimeout(() => iniciarPatrullaCamaras(cams, index + 1), 1500);
          }
        })
        .start();
    }

    function capturarPantalla3D() {
      renderer.render(scene, camera);
      const dataURL = renderer.domElement.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'mapa_3d_tienda_' + Date.now() + '.png';
      link.href = dataURL;
      link.click();
    }

    function guardarPlanoGAS() {
      const serializado = objects.map(o => ({
        type: o.userData.type,
        name: o.userData.name,
        pos: [o.position.x, o.position.y, o.position.z],
        rot: [o.rotation.x, o.rotation.y, o.rotation.z],
        scale: [o.scale.x, o.scale.y, o.scale.z],
        fov: o.userData.fov,
        dist: o.userData.dist,
        imageUrl: o.userData.imageUrl
      }));

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler((res) => alert(res.message))
          .guardarMapaTienda('tienda_main', JSON.stringify(serializado));
      } else {
        localStorage.setItem('MAPA_3D_DEMO', JSON.stringify(serializado));
        alert('Plano 3D guardado exitosamente.');
      }
    }
  </script>
