  <script>
    const TODOS_LOS_EMPLEADOS = ["Angel", "Daniel", "Gary", "Jose Luis", "Britniel", "Maxwell", "Jelissa", "Omar", "Diego", "Katherine", "Oliver", "Ricardo"];

    let portapapelesTurnos = null;

    function escaparHTML(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, function(match) { const mapa = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }; return mapa[match]; });
    }

    function manejarErrorServidor(err) {
      const msg = err && err.message ? err.message : "Ocurrió un error inesperado al contactar con el servidor.";
      Swal.fire({ title: "Error del Servidor", text: msg, icon: "error", customClass: { popup: 'swal-dark-popup' }, background: 'transparent' });
    }

    function formatearFechaLocal(fechaActual) {
      const yyyy = fechaActual.getFullYear(); const mm = String(fechaActual.getMonth() + 1).padStart(2, '0'); const dd = String(fechaActual.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function mostrarModalSincronizando(titulo = 'Sincronizando...') {
      Swal.fire({
        title: titulo,
        html: `<div style="color: var(--text-muted); font-size: 13px; margin-top: 5px;">Guardando de forma segura en la base de datos...</div><div class="progress-container-swal"><div id="loading-bar" class="progress-bar-swal"></div></div>`,
        background: 'transparent', customClass: { popup: 'swal-dark-popup' }, allowOutsideClick: false, allowEscapeKey: false, showConfirmButton: false,
        didOpen: () => {
          const bar = document.getElementById('loading-bar'); if (!bar) return;
          let progreso = 0;
          const intervalo = setInterval(() => {
            if (progreso < 50) { progreso += 10; } else if (progreso < 85) { progreso += 3; } else if (progreso < 93) { progreso += 1; } else { clearInterval(intervalo); }
            bar.style.width = progreso + '%';
          }, 200);
          bar.dataset.intervalId = intervalo;
        }
      });
    }

    function completarBarraYMostrarExito(tituloExito, textoExito) {
      const bar = document.getElementById('loading-bar');
      if (bar) {
        if (bar.dataset.intervalId) clearInterval(parseInt(bar.dataset.intervalId));
        bar.style.width = '100%'; bar.style.background = 'var(--success)'; bar.style.boxShadow = '0 0 15px var(--success)';
      }
      setTimeout(() => {
        Swal.fire({ title: tituloExito, text: textoExito, icon: 'success', customClass: { popup: 'swal-dark-popup' }, background: 'transparent', confirmButtonColor: 'var(--glass-border)' });
      }, 400);
    }

    const HORA_INICIO_GRID = 7; const TOTAL_HORAS_GRID = 13;
    let turnosActuales = []; let filtroEstadoLiveActual = 'todos'; 
    let memoriaContadores = { working: -1, break: -1, inactive: -1 };
    let memoriaAvataresHTML = ""; 

    const EXCEPCIONES = ["Licencia", "Vacaciones", "Libre Cumpleaños", "Clases", "Ausencia", "Feriado", "Dia Libre"];
    const ICONOS_EXCEPCION = { "Licencia": "medical_services", "Vacaciones": "flight_takeoff", "Libre Cumpleaños": "cake", "Clases": "school", "Ausencia": "person_off", "Feriado": "celebration", "Dia Libre": "weekend" };

    let modoSeleccion = false; let turnosSeleccionados = []; let modoOrden = false; let draggedRow = null;

    function handleTrackHover(event, index) {
      if (modoOrden || modoSeleccion) return; // No mostrar si estamos editando en lote
      const item = turnosActuales[index];
      if (!item) return;

      const tooltip = document.getElementById('custom-tooltip');
      if (!tooltip) return;

      let html = `<div class="tooltip-header"><span class="material-symbols-outlined" style="font-size:16px;">person</span> ${escaparHTML(item.nombre)}</div><div class="tooltip-body">`;
      
      if (EXCEPCIONES.includes(item.entrada)) {
        html += `<div class="tooltip-row"><strong style="color:var(--danger);">Estado:</strong> ${item.entrada}</div>`;
      } else {
        html += `<div class="tooltip-row"><strong style="color:var(--accent-primary);">Horario:</strong> ${item.entrada} a ${item.salida}</div>`;
        if (item.breakIn && item.breakOut) {
          html += `<div class="tooltip-row"><strong style="color:var(--warning);">Break:</strong> ${item.breakIn} a ${item.breakOut}</div>`;
        }
      }

      if (item.nota && item.nota.trim() !== "") {
        html += `<div class="tooltip-nota"><span class="material-symbols-outlined" style="font-size:14px; vertical-align:middle; margin-right:4px;">edit_note</span>${escaparHTML(item.nota)}</div>`;
      }
      html += `</div>`;

      tooltip.innerHTML = html;
      tooltip.classList.add('visible');

      // Calcular posición para que siga al ratón sin salirse de la pantalla
      let x = event.clientX + 15;
      let y = event.clientY + 15;
      if (x + 280 > window.innerWidth) x = window.innerWidth - 290;
      if (y + 150 > window.innerHeight) y = event.clientY - tooltip.offsetHeight - 15;

      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function ocultarTooltip() {
      const tooltip = document.getElementById('custom-tooltip');
      if (tooltip) tooltip.classList.remove('visible');
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('fechaFiltro').value = formatearFechaLocal(new Date());
      cargarHorarios();
      const contenedorRows = document.getElementById("contenedorRows");
      if (contenedorRows) {
        contenedorRows.addEventListener("dragover", e => {
          if(!modoOrden) return; e.preventDefault(); 
          const afterElement = getDragAfterElement(contenedorRows, e.clientY);
          if (afterElement == null) { contenedorRows.appendChild(draggedRow); } else { contenedorRows.insertBefore(draggedRow, afterElement); }
        });
      }
      setInterval(() => { actualizarDashboardVivo(); }, 1000);
    });

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll('.timeline-row:not(.dragging)')];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect(); const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) return { offset: offset, element: child }; else return closest;
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function cargarHorarios() {
      filtroEstadoLiveActual = 'todos'; document.querySelectorAll('.db-card').forEach(c => c.style.borderColor = 'var(--glass-border)');
      const fechaInput = document.getElementById('fechaFiltro').value; const spanDia = document.getElementById('dia-semana-toolbar');
      if (fechaInput && spanDia) { const partes = fechaInput.split('-'); const diaTexto = new Date(partes[0], partes[1] - 1, partes[2]).toLocaleDateString('es-ES', {weekday: 'long'}).toUpperCase(); spanDia.innerText = diaTexto; }
      const contenedor = document.getElementById("contenedorRows");
      if (contenedor) contenedor.innerHTML = `<div style="padding: 30px; color:var(--text-muted); text-align:center; font-size:13px; width: 90%;">Buscando turnos en Google Sheets...</div>`;
      google.script.run
        .withSuccessHandler(function(datosDeLaHoja) { turnosActuales = Array.isArray(datosDeLaHoja) ? datosDeLaHoja : []; renderizarTimeline(turnosActuales); analizarCobertura(); })
        .withFailureHandler(manejarErrorServidor)
        .getHorariosPorFecha(fechaInput); 
    }
    
    
  function copiarTurnosDia() {
  if (!turnosActuales || turnosActuales.length === 0) {
    return Swal.fire({ title: "Día Vacío", text: "No hay turnos para copiar en este día.", icon: "info", background: 'transparent', customClass: { popup: 'swal-dark-popup' } });
  }
  // Hacemos una copia profunda de los turnos actuales
  portapapelesTurnos = JSON.parse(JSON.stringify(turnosActuales));
  
  // Mostramos el botón de pegar
  document.getElementById('btn-pegar-dia').style.display = 'flex';
  
  const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, background: 'rgba(15, 15, 18, 0.9)', color: 'var(--accent-primary)' });
  Toast.fire({ icon: 'success', title: `¡${portapapelesTurnos.length} turnos copiados!` });
}

function pegarTurnosDia() {
  if (!portapapelesTurnos || portapapelesTurnos.length === 0) return;
  const fechaDestino = document.getElementById('fechaFiltro').value;
  
  Swal.fire({
    title: '¿Pegar Turnos?',
    text: `Se insertarán ${portapapelesTurnos.length} turnos en el día ${fechaDestino}.`,
    icon: 'question',
    background: 'transparent',
    customClass: { popup: 'swal-dark-popup' },
    showCancelButton: true,
    confirmButtonText: 'Sí, pegar aquí',
    cancelButtonText: 'Cancelar'
  }).then((result) => {
    if (result.isConfirmed) {
      mostrarModalSincronizando('Pegando Cronograma...');
      google.script.run
        .withSuccessHandler(function() {
          cargarHorarios();
          completarBarraYMostrarExito('¡Completado!', 'Los turnos fueron clonados exitosamente.');
        })
        .withFailureHandler(manejarErrorServidor)
        .pegarTurnosMasivosBackend(fechaDestino, portapapelesTurnos);
    }
  });
}

    function renderizarTimeline(lista) {
      const contenedor = document.getElementById("contenedorRows"); if (!contenedor) return;
      if (!Array.isArray(lista)) lista = []; contenedor.innerHTML = ""; filtroEstadoLiveActual = 'todos'; document.querySelectorAll('.db-card').forEach(c => c.style.borderColor = 'var(--glass-border)');
      if (lista.length === 0) {
        document.getElementById('liveDashboard').style.display = 'none';
        contenedor.innerHTML = `<div style="text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; background: var(--glass-bg); border-radius: 8px; margin-top: 10px; width:100%; box-sizing:border-box;"><span class="material-symbols-outlined" style="font-size: 28px; color: var(--glass-border); display: block; margin-bottom: 8px;">calendar_today</span>No hay turnos planificados para esta fecha.<br><span style="color: var(--accent-primary); font-weight:600; cursor:pointer;" onclick="abrirModalNuevoHorario()">Haz clic aquí para asignar el primer turno</span></div>`;
        return;
      }

      let seleccionadosStr = turnosSeleccionados.map(String);
      lista.forEach((item, index) => {
        const row = document.createElement("div"); row.className = "timeline-row"; row.style.opacity = "0"; row.style.animation = `fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards`; row.style.animationDelay = `${index * 0.04}s`;
        let barrasHTML = ""; let nombreEscapado = escaparHTML(item.nombre);
        
        // INDICADOR DE NOTA: Ahora está diseñado para ir al lado del nombre
        let iconoNotaHtml = (item.nota && item.nota.trim() !== "") ? `<span class="material-symbols-outlined" style="font-size:15px; margin-left:4px; color:var(--warning); cursor:help;" title="Tiene una nota en su turno">edit_note</span>` : '';

        // BARRAS LIMPIAS: Ya no llevan el icono por dentro
        if (EXCEPCIONES.includes(item.entrada)) {
          let icono = ICONOS_EXCEPCION[item.entrada] || "event_busy";
          barrasHTML = `<div class="block-excepcion"><span class="material-symbols-outlined" style="font-size: 15px; margin-right: 6px; margin-bottom: 2px;">${icono}</span>${item.entrada}</div>`;
        } else if (item.breakIn && item.breakOut) {
          const estiloTrabajo1 = calcularPosicion(item.entrada, item.breakIn); const estiloBreak = calcularPosicion(item.breakIn, item.breakOut); const estiloTrabajo2 = calcularPosicion(item.breakOut, item.salida);
          barrasHTML = `<div class="block-laboral" style="${estiloTrabajo1}">${item.entrada} a ${item.breakIn}</div><div class="block-descanso" style="${estiloBreak}">BREAK</div><div class="block-laboral" style="${estiloTrabajo2}">${item.breakOut} a ${item.salida}</div>`;
        } else {
          const estiloCompleto = calcularPosicion(item.entrada, item.salida); 
          barrasHTML = `<div class="block-laboral" style="${estiloCompleto}">${item.entrada} a ${item.salida}</div>`;
        }
        
        let controlesExtras = "";
        if (modoOrden) {
          controlesExtras = `<div style="display:flex; align-items:center; margin-right:8px;"><span class="material-symbols-outlined drag-handle" style="font-size:20px;">drag_indicator</span></div>`;
          row.draggable = true; row.setAttribute("data-id", item.id);
          row.addEventListener("dragstart", function() { draggedRow = row; setTimeout(() => row.classList.add("dragging"), 0); }); row.addEventListener("dragend", function() { row.classList.remove("dragging"); draggedRow = null; sincronizarOrdenSilencioso(); });
        } else if (modoSeleccion) {
          const isChecked = seleccionadosStr.includes(String(item.id)) ? "checked" : "";
          controlesExtras = `<div style="display:flex; align-items:center; margin-right:12px;"><input type="checkbox" class="checkbox-masivo" ${isChecked} onclick="event.stopPropagation(); toggleSeleccionTurno('${item.id}')"></div>`;
        }
        
        let accionClick = (modoOrden || modoSeleccion) ? "" : `editarTurno(${index})`; 
        let jsonNombre = JSON.stringify(item.nombre).replace(/"/g, '&quot;'); 
        let clickPerfil = (modoOrden || modoSeleccion) ? "" : `verPerfilColaborador(${jsonNombre})`;
        
        // El icono de nota se inserta después del nombre del colaborador
        row.innerHTML = `
          <div class="colaborador-info" style="${modoOrden || modoSeleccion ? 'margin-left:-5px;' : 'cursor:pointer;'}" onclick="${clickPerfil}" title="Ver historial de ${nombreEscapado}">
            ${controlesExtras}<img src="${item.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(item.nombre)+'&background=27272a&color=fff'}" alt="Foto"><span class="colaborador-name">${nombreEscapado}</span>${iconoNotaHtml}
          </div>
          <div class="shift-track" onclick="${accionClick}" onmousemove="handleTrackHover(event, ${index})" onmouseleave="ocultarTooltip()" style="${modoOrden || modoSeleccion ? 'cursor:default; opacity:0.5;' : ''}">
            ${barrasHTML}
          </div>`;
        contenedor.appendChild(row);
      });
      actualizarDashboardVivo(); 
    }

    function animarContadorDash(id, nuevoValor, llave) {
      if (memoriaContadores[llave] === nuevoValor) return; memoriaContadores[llave] = nuevoValor;
      const el = document.getElementById(id); if (!el) return;
      el.innerText = nuevoValor; el.style.transition = 'none'; el.style.transform = 'scale(1.5)'; el.style.color = 'var(--text-main)';
      setTimeout(() => { el.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; el.style.transform = 'scale(1)'; el.style.color = 'var(--text-main)'; }, 50);
    }

    function actualizarDashboardVivo() {
      const dbContainer = document.getElementById('liveDashboard');
      if (!dbContainer || turnosActuales.length === 0) { if (dbContainer) dbContainer.style.display = 'none'; return; }
      dbContainer.style.display = 'block'; const ahora = new Date();
      
      const clkH = document.getElementById('clk-h'); const clkM = document.getElementById('clk-m'); const clkS = document.getElementById('clk-s');
      if (clkH && clkM && clkS) { clkH.innerText = String(ahora.getHours()).padStart(2, '0'); clkM.innerText = String(ahora.getMinutes()).padStart(2, '0'); clkS.innerText = String(ahora.getSeconds()).padStart(2, '0'); }

      const horaActualMins = ahora.getHours() * 60 + ahora.getMinutes(); const fechaFiltro = document.getElementById('fechaFiltro').value; const hoyStr = formatearFechaLocal(new Date());
      const isToday = (fechaFiltro === hoyStr); const dotLive = document.querySelector('.dot-live'); const textLive = document.getElementById('live-text');

      if (dotLive && textLive) {
        if (isToday) { dotLive.className = 'dot-live'; textLive.innerText = 'MONITOREO EN VIVO'; textLive.style.color = 'var(--text-main)'; } 
        else { dotLive.className = 'dot-live simulated'; textLive.innerText = 'VISTA SIMULADA (SEGÚN HORA ACTUAL)'; textLive.style.color = 'var(--warning)'; }
      }

      let trabajando = 0, enBreak = 0, fuera = 0; let avatarsHTML = `<span style="margin-right:8px; font-weight:700; color:var(--text-muted); text-transform:uppercase; font-size:10px; letter-spacing:0.5px;">Monitoreando:</span>`;
      const aMinutos = (hora) => { if(!hora) return 0; let [h, m] = hora.split(':').map(Number); return (h * 60) + m; };

      turnosActuales.forEach(t => {
        let estado = 'fuera';
        if (!EXCEPCIONES.includes(t.entrada) && t.entrada && t.salida) {
          let inM = aMinutos(t.entrada), outM = aMinutos(t.salida); let bIn = t.breakIn ? aMinutos(t.breakIn) : -1, bOut = t.breakOut ? aMinutos(t.breakOut) : -1;
          if (horaActualMins >= inM && horaActualMins < outM) { if (bIn !== -1 && horaActualMins >= bIn && horaActualMins < bOut) { estado = 'break'; enBreak++; } else { estado = 'trabajando'; trabajando++; } } else { fuera++; }
        } else { fuera++; }
        t._estadoLive = estado; 

        if (estado === 'trabajando' || estado === 'break') {
          let dotClass = estado === 'trabajando' ? 'breathe-green' : 'breathe-amber';
          let fotoUrl = t.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(t.nombre)+'&background=27272a&color=fff';
          avatarsHTML += `<div class="avatar-live-badge" title="${escaparHTML(t.nombre)} | ${estado==='trabajando'?'Operando':'En Break'}"><img src="${fotoUrl}"><span style="color:var(--text-main); font-size:11px; font-weight:600;">${escaparHTML(t.nombre)}</span>
          </div>`;
        }
      });

      animarContadorDash('count-working', trabajando, 'working'); animarContadorDash('count-break', enBreak, 'break'); animarContadorDash('count-inactive', fuera, 'inactive');
      
      let nuevoHTMLAvatares = (trabajando + enBreak > 0) ? avatarsHTML : '<span style="color:var(--text-muted); font-style:italic;">Ningún colaborador operando activamente.</span>';
      if (memoriaAvataresHTML !== nuevoHTMLAvatares) { document.getElementById('active-avatars').innerHTML = nuevoHTMLAvatares; memoriaAvataresHTML = nuevoHTMLAvatares; }
    }

    function filtrarPorEstadoLive(estado) {
      if (modoOrden || modoSeleccion) return;
      if (filtroEstadoLiveActual === estado) { filtroEstadoLiveActual = 'todos'; document.querySelectorAll('.db-card').forEach(c => c.style.borderColor = 'var(--glass-border)'); } 
      else { filtroEstadoLiveActual = estado; document.querySelectorAll('.db-card').forEach(c => c.style.borderColor = 'var(--glass-border)'); let card = document.querySelector(`.card-${estado}`); if (card) card.style.borderColor = estado === 'trabajando' ? 'var(--accent-primary)' : (estado === 'break' ? 'var(--warning)' : 'var(--text-muted)'); }
      const filas = document.querySelectorAll(".timeline-row");
      turnosActuales.forEach((t, idx) => {
        if (!filas[idx]) return;
        if (filtroEstadoLiveActual === 'todos') { filas[idx].style.display = "grid"; } else { filas[idx].style.display = (t._estadoLive === filtroEstadoLiveActual) ? "grid" : "none"; }
      });
      document.getElementById("buscarColaborador").value = "";
    }

    function calcularPosicion(hEntrada, hSalida) {
      if (!hEntrada || !hSalida) return "display:none;";
      const [entH, entM] = hEntrada.split(':').map(Number); const [salH, salM] = hSalida.split(':').map(Number);
      const entradaDec = entH + (entM / 60); const salidaDec = salH + (salM / 60);
      const left = ((entradaDec - HORA_INICIO_GRID) / TOTAL_HORAS_GRID) * 100; const width = ((salidaDec - entradaDec) / TOTAL_HORAS_GRID) * 100;
      return `left: ${left}%; width: calc(${width}% - 2px);`;
    }

    function filtrarTimeline() {
      filtroEstadoLiveActual = 'todos'; document.querySelectorAll('.db-card').forEach(c => c.style.borderColor = 'var(--glass-border)');
      const buscar = document.getElementById("buscarColaborador").value.toLowerCase(); const filas = document.querySelectorAll(".timeline-row");
      filas.forEach(fila => { const span = fila.querySelector(".colaborador-name"); if (!span) return; const nombre = span.innerText.toLowerCase(); fila.style.display = nombre.includes(buscar) ? "grid" : "none"; });
    }

    function cambiarDia(dias) {
      const input = document.getElementById('fechaFiltro'); let fechaActual = new Date(input.value + 'T00:00:00'); fechaActual.setDate(fechaActual.getDate() + dias); input.value = formatearFechaLocal(fechaActual); cargarHorarios();
    }

    function analizarCobertura() {
      if (!Array.isArray(turnosActuales)) return;
      const aMinutos = (hora) => { if(!hora) return 0; let [h, m] = hora.split(':').map(Number); return (h * 60) + m; };
      const aHoraTexto = (mins) => { return `${Math.floor(mins / 60).toString().padStart(2, '0')}:${(mins % 60).toString().padStart(2, '0')}`; };
      const fechaSel = document.getElementById('fechaFiltro').value; const partes = fechaSel.split('-'); const objetoFecha = new Date(partes[0], partes[1] - 1, partes[2]); const diaSemana = objetoFecha.getDay(); 
      let fallos = [];

      for(let m = 7.5 * 60; m < 19 * 60; m += 30) {
        let activos = 0;
        turnosActuales.forEach(t => {
          if(!t.entrada || !t.salida || EXCEPCIONES.includes(t.entrada)) return;
          let inM = aMinutos(t.entrada); let outM = aMinutos(t.salida); let bIn = t.breakIn ? aMinutos(t.breakIn) : -1; let bOut = t.breakOut ? aMinutos(t.breakOut) : -1;
          if ((m >= inM && m < outM) && !(bIn !== -1 && m >= bIn && m < bOut)) activos++;
        });
        let msg = ""; let tipo = ""; 
        if (diaSemana === 0) { if (m >= 10 * 60 && m < 18 * 60) { if (m < 12 * 60 || m >= 16 * 60) { if (activos < 3) { msg = `Mínimo 3 (Hay ${activos})`; tipo = "danger"; } } else { if (activos < 2) { msg = `Mínimo 2 en almuerzo (Hay ${activos})`; tipo = "danger"; } } } }
        else if (diaSemana === 6) { if (m >= 8 * 60 && m < 18 * 60) { if (m === 8 * 60) { if (activos < 2) { msg = `Mínimo 2 (Hay ${activos})`; tipo = "danger"; } } else if (m >= 8.5 * 60 && m < 9 * 60) { if (activos < 3) { msg = `Mínimo 3 (Hay ${activos})`; tipo = "danger"; } else if (activos > 4) { msg = `Exceso (Hay ${activos})`; tipo = "warning"; } } else if (m >= 9 * 60 && m < 17 * 60) { if (activos < 6) { msg = `Mínimo 6 (Hay ${activos})`; tipo = "danger"; } } else if (m >= 17 * 60 && m < 18 * 60) { if (activos < 4) { msg = `Mínimo 4 (Hay ${activos})`; tipo = "danger"; } } } }
        else { if (m === 7.5 * 60 && activos === 0) { msg = `Faltan, req 1`; tipo = "danger"; } else if (m >= 8 * 60 && m < 9 * 60) { if (activos < 3) { msg = `Mínimo 3 (Hay ${activos})`; tipo = "danger"; } else if (activos > 4) { msg = `Exceso (Hay ${activos})`; tipo = "warning"; } } else if (m >= 9 * 60 && m < 17 * 60 && activos < 6) { msg = `Mínimo 6 (Hay ${activos})`; tipo = "danger"; } else if (m >= 17 * 60 && m < 19 * 60 && activos < 4) { msg = `Mínimo 4 (Hay ${activos})`; tipo = "danger"; } }
        if(msg !== "") fallos.push({ inicio: m, fin: m + 30, mensaje: msg, tipo: tipo });
      }

      let fallosAgrupados = [];

    function sugerirBreak(entrada, salida, turnosExistentes, editIndex = -1) {
      if (!entrada || !salida) return { breakIn: "", breakOut: "" }; let turnosAComparar = turnosExistentes.filter((_, i) => i !== editIndex);
      const aMinutos = (hstr) => { if(!hstr) return 0; let [h, m] = hstr.split(':').map(Number); return (h * 60) + m; }; const aHoraTexto = (mins) => { return `${Math.floor(mins / 60).toString().padStart(2, '0')}:${(mins % 60).toString().padStart(2, '0')}`; };
      let minEntrada = aMinutos(entrada); let minSalida = aMinutos(salida); let duracionTurno = minSalida - minEntrada; let esTurnoTarde = (minEntrada >= 12 * 60); 

      if (duracionTurno <= 180) return { breakIn: "", breakOut: "" }; if (!esTurnoTarde && duracionTurno <= 360) return { breakIn: "", breakOut: "" };
      let slotsPermitidos = [];
      if (esTurnoTarde) { let mitadJornada = minEntrada + (duracionTurno / 2); let centro = Math.floor(mitadJornada / 30) * 30; slotsPermitidos = [centro, centro - 30, centro + 30, centro - 60, centro + 60]; } 
      else { slotsPermitidos = [12*60, 13*60, 14*60, 12.5*60, 13.5*60]; }

      let candidatos = slotsPermitidos.filter(s => s >= (minEntrada + 60) && (s + 60) <= (minSalida - 60)).map(slot => { let overlaps = 0; turnosAComparar.forEach(turno => { if (turno.breakIn && slot < aMinutos(turno.breakOut) && (slot + 60) > aMinutos(turno.breakIn)) overlaps++; }); let ideal = minEntrada + (duracionTurno / 2); return { slot, overlaps, isPrimary: (slot % 60 === 0), distancia: Math.abs(slot - ideal) }; });
      if (candidatos.length === 0) return { breakIn: "", breakOut: "" };
      candidatos.sort((a, b) => { if (a.overlaps !== b.overlaps) return a.overlaps - b.overlaps; if (a.isPrimary !== b.isPrimary) return a.isPrimary ? -1 : 1; return a.distancia - b.distancia; });
      return { breakIn: aHoraTexto(candidatos[0].slot), breakOut: aHoraTexto(candidatos[0].slot + 60) };
    }

    function triggerAutoSugerencia(prefix = 'swal', editIndex = -1) {

      let minEntrada = aMinutos(ent); let duracionTurno = aMinutos(sal) - minEntrada; let esTurnoTarde = (minEntrada >= 12 * 60);

    const debounceTimers = {}; const ultimasBusquedasIA = {};

    function ejecutarPrediccionIA(nombre, prefix = 'swal') {

        return;

      if (prefix === 'swal') ultimasBusquedasIA[prefix] = nombre;
      statusDiv.style.display = "flex"; statusDiv.style.color = "var(--text-muted)"; statusDiv.innerHTML = "Teclando...";

        statusDiv.style.color = "var(--warning)"; statusDiv.innerHTML = `<span class="material-symbols-outlined" style="font-size:15px; animation: spin 1s linear infinite; display:inline-block;">sync</span> Analizando historial de los ${nombreDia}...`;

        google.script.run
          .withSuccessHandler(function(sugerencia) {
            if (prefix === 'swal' && ultimasBusquedasIA[prefix] !== nombre) return;

              }
            }

            const inputsToGlow = [];
            if (selectTipo && EXCEPCIONES.includes(sugerencia.entrada)) inputsToGlow.push(selectTipo);
            if (!EXCEPCIONES.includes(sugerencia.entrada)) {
              if (inpEntrada) inputsToGlow.push(inpEntrada); if (inpSalida) inputsToGlow.push(inpSalida);
              if (chkBreak && chkBreak.checked) { if (inpBreakIn) inputsToGlow.push(inpBreakIn); if (inpBreakOut) inputsToGlow.push(inpBreakOut); }

          })
          .withFailureHandler(manejarErrorServidor)
          .predecirHorarioColaborador(nombre, fechaSel);
      }, 500);

    function renderizarFilasPerfil(mesAnio) {
      const tbody = document.getElementById('tbody-perfil'); 
      const statsDiv = document.getElementById('stats-perfil'); 
      if (!tbody || !statsDiv) return;
      
      let historialFiltrado = historialActual.filter(t => t.fecha && t.fecha.startsWith(mesAnio)); 
      const diasTexto = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"]; 
      let trs = "";

      // Variables exclusivas para cada quincena
      let totalMinutosQ1 = 0;
      let totalMinutosQ2 = 0;

      // 0. CALCULAR EL ÚLTIMO DÍA DEL MES DINÁMICAMENTE
      let partesMes = mesAnio.split('-');
      let anioSelect = parseInt(partesMes[0], 10);
      let mesSelect = parseInt(partesMes[1], 10);
      // Al pasar 0 como día, JS retrocede al último día del mes anterior (que es el mes actual que queremos)
      let ultimoDiaMes = new Date(anioSelect, mesSelect, 0).getDate(); 

      const aMinutos = (hora) => { 
        if(!hora || !hora.includes(':')) return 0; 
        let [h, m] = hora.split(':').map(Number); 
        return (h * 60) + m; 
      };

      // 1. OBTENER LÍMITES DE LA SEMANA LITERAL
      let fechaMain = document.getElementById('fechaFiltro').value;
      let pMain = fechaMain.split('-');
      let dMain = new Date(pMain[0], pMain[1] - 1, pMain[2]);
      let diaSemana = dMain.getDay();
      
      let diffLunes = dMain.getDate() - diaSemana + (diaSemana === 0 ? -6 : 1);
      let dLunes = new Date(dMain.getFullYear(), dMain.getMonth(), diffLunes);
      let dDomingo = new Date(dLunes); 
      dDomingo.setDate(dLunes.getDate() + 6);
      
      const fmtD = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      let strLunes = fmtD(dLunes);
      let strDomingo = fmtD(dDomingo);

      // 2. CALCULAR HORAS DE LA SEMANA ACTUAL
      let minTrabajadosSemana = 0;
      historialActual.forEach(t => {
        if (t.fecha >= strLunes && t.fecha <= strDomingo) {
          if (!EXCEPCIONES.includes(t.entrada) && t.entrada && t.salida) {
            let mE = aMinutos(t.entrada); 
            let mS = aMinutos(t.salida);
            if(mS < mE) mS += 24 * 60; 
            
            let mB = 0;
            if (t.breakIn && t.breakOut) {
              let mBi = aMinutos(t.breakIn); 
              let mBo = aMinutos(t.breakOut);
              if(mBo < mBi) mBo += 24 * 60;
              mB = mBo - mBi;
            }
            minTrabajadosSemana += (mS - mE - mB);
          }
        }
      });

      // 3. PROCESAR TABLA Y QUINCENAS
      historialFiltrado.forEach((t) => {
        let indexReal = historialActual.indexOf(t); 
        let partes = t.fecha.split('-'); 
        let objFecha = new Date(partes[0], partes[1] - 1, partes[2]); 
        let diaSemanaTexto = diasTexto[objFecha.getDay()];
        
        // EXTRACCIÓN SEGURA DEL DÍA
        let diaDelMes = parseInt(partes[2], 10);
        
        let descAlmuerzo = (t.breakIn && t.breakOut) ? `${t.breakIn} - ${t.breakOut}` : '<span style="color:var(--text-muted); font-style:italic;">Sin almuerzo</span>';
        let turnoLabel = EXCEPCIONES.includes(t.entrada) ? `<span style="color:var(--warning); font-weight:bold;">${t.entrada}</span>` : `${t.entrada} a ${t.salida}`;
        
        if (!EXCEPCIONES.includes(t.entrada) && t.entrada && t.salida) {
          let minEntrada = aMinutos(t.entrada);
          let minSalida = aMinutos(t.salida);
          if(minSalida < minEntrada) minSalida += 24 * 60; 

          let minBreak = 0;
          if (t.breakIn && t.breakOut) {
            let mBi = aMinutos(t.breakIn);
            let mBo = aMinutos(t.breakOut);
            if(mBo < mBi) mBo += 24 * 60;
            minBreak = mBo - mBi;
          }
          
          let minNetosTurno = (minSalida - minEntrada - minBreak);

          // LÓGICA ESTRICTA DE QUINCENAS
          if (diaDelMes >= 1 && diaDelMes <= 15) {
            totalMinutosQ1 += minNetosTurno; // Suma a 1ra Quincena
          } else if (diaDelMes >= 16 && diaDelMes <= ultimoDiaMes) {
            totalMinutosQ2 += minNetosTurno; // Suma a 2da Quincena (Hasta fin de mes exacto)
          }
        }

        trs += `<tr><td style="white-space: nowrap; color: var(--text-muted);">${t.fecha} <span style="color:var(--accent-primary); font-weight:600; margin-left:6px; font-size:11px;">(${diaSemanaTexto})</span></td><td>${turnoLabel}</td><td>${descAlmuerzo}</td><td style="width:40px;"><button class="btn-edit-micro" onclick="editarTurnoHistorial(${indexReal})"><span class="material-symbols-outlined" style="font-size:14px;">edit</span></button></td></tr>`;
      });
      
      if (trs === "") {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 30px; color:var(--text-muted);">No hay registros guardados para este mes.</td></tr>`;
        statsDiv.innerHTML = ""; 
      } else {
        tbody.innerHTML = trs;

        // Horas Quincena 1
        let horasQ1 = Math.floor(totalMinutosQ1 / 60);
        let minsQ1 = totalMinutosQ1 % 60;

        // Horas Quincena 2
        let horasQ2 = Math.floor(totalMinutosQ2 / 60);
        let minsQ2 = totalMinutosQ2 % 60;
        
        // Horas Semana Actual
        let horasSemana = Math.floor(minTrabajadosSemana / 60);
        let minsSemana = minTrabajadosSemana % 60;

        statsDiv.innerHTML = `
          <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 12px 10px; border-radius: 8px; text-align: center;">
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight:bold;">1ra Quincena (1 - 15)</div>
            <div style="font-size: 18px; font-weight: bold; color: var(--text-main);">${horasQ1}h ${minsQ1 > 0 ? minsQ1 + 'm' : ''}</div>
          </div>
          <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 12px 10px; border-radius: 8px; text-align: center;">
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight:bold;">2da Quincena (16 - ${ultimoDiaMes})</div>
            <div style="font-size: 18px; font-weight: bold; color: var(--text-main);">${horasQ2}h ${minsQ2 > 0 ? minsQ2 + 'm' : ''}</div>
          </div>
          <div style="background: var(--accent-glow); border: 1px solid var(--accent-glow); padding: 12px 10px; border-radius: 8px; text-align: center;" title="Semana del Lunes ${strLunes.substring(8)} al Domingo ${strDomingo.substring(8)}">
            <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; font-weight:bold;">Semana (En curso)</div>
            <div style="font-size: 18px; font-weight: bold; color: var(--accent-primary); display: flex; justify-content: center; align-items: center; gap: 4px;">
              <span class="material-symbols-outlined" style="font-size: 16px;">calendar_month</span> ${horasSemana}h ${minsSemana > 0 ? minsSemana + 'm' : ''}
            </div>
          </div>
        `;
      }
    }

    function editarTurnoHistorial(index) {
      const turno = historialActual[index]; if (!turno) return;
      let tieneAlmuerzo = (turno.breakIn && turno.breakOut) ? 'checked' : ''; let opacidadInicial = tieneAlmuerzo ? '1' : '0.4'; let desactivadoInicial = tieneAlmuerzo ? '' : 'disabled';
      let esExcepcion = EXCEPCIONES.includes(turno.entrada); let displayTiempos = esExcepcion ? 'none' : 'block'; let displayBotonIA = esExcepcion ? 'none' : 'flex'; 
      let nombreEscapado = turno.nombre.replace(/'/g, "\\'"); let prefix = 'edit-history';

      Swal.fire({
        title: `Editar Registro: ${escaparHTML(turno.nombre)}`,
        customClass: { popup: 'swal-dark-popup' },
        background: 'transparent',
        html: `<div style="text-align:left; color:var(--text-main);">
              <div
                style="margin-bottom: 15px; font-size: 13px; color: var(--text-main); background: var(--glass-bg); padding: 8px 10px; border-radius: 6px; border: 1px solid var(--glass-border);">
                <span class="material-symbols-outlined" style="font-size:16px; vertical-align:middle; color:var(--accent-primary); margin-right:4px;">calendar_today</span>
                Editando: <b>${turno.fecha}</b>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <label style="font-size:12px; font-weight:700;">TIPO DE ASIGNACIÓN</label><button id="btn-ia-${prefix}" class="btn-edit-micro" style="padding: 2px 8px; font-size:10px; display: ${displayBotonIA};" onclick="ejecutarPrediccionIA('${nombreEscapado}', '${prefix}')"><span class="material-symbols-outlined" style="font-size:12px; margin-right:4px;">auto_awesome</span> Sugerir con IA</button>
              </div>
              <select id="${prefix}-tipo" class="input-filtro" style="width:100%; margin-bottom:15px;" onchange="toggleTipoTurno('${prefix}'); if(this.value === 'Normal' && ${esExcepcion}) document.getElementById('btn-ia-${prefix}').click();"><option value="Normal" ${!esExcepcion ? 'selected' : ''}>Horario Laboral Regular</option><option value="Licencia" ${turno.entrada === 'Licencia' ? 'selected' : ''}>Licencia (L)</option><option value="Vacaciones" ${turno.entrada === 'Vacaciones' ? 'selected' : ''}>Vacaciones (V)</option><option value="Libre Cumpleaños" ${turno.entrada === 'Libre Cumpleaños' ? 'selected' : ''}>Libre Cumpleaños (LC)</option><option value="Clases" ${turno.entrada === 'Clases' ? 'selected' : ''}>Clases (C)</option><option value="Ausencia" ${turno.entrada === 'Ausencia' ? 'selected' : ''}>Ausencia (A)</option><option value="Feriado" ${turno.entrada === 'Feriado' ? 'selected' : ''}>Feriado (F)</option><option value="Dia Libre" ${turno.entrada === 'Dia Libre' ? 'selected' : ''}>Dia Libre (DL)</option></select>
              <div id="${prefix}-ia-status"
                style="font-size:11px; color:var(--text-muted); font-style:italic; margin-bottom:15px; display:none; align-items:center; gap:4px; min-height:16px;">
              </div>
              <div id="${prefix}-contenedor-tiempos" style="display: ${displayTiempos};">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                  <div><label style="font-size:12px; font-weight:700;">ENTRADA</label><input type="time" id="${prefix}-entrada" class="input-filtro" style="width:100%; box-sizing:border-box;" value="${!esExcepcion ? turno.entrada : '07:30'}">
                  </div>
                  <div><label style="font-size:12px; font-weight:700;">SALIDA</label><input type="time" id="${prefix}-salida" class="input-filtro" style="width:100%; box-sizing:border-box;" value="${!esExcepcion ? turno.salida : '19:00'}">
                  </div>
                </div>
                <div style="margin-top:20px; display:flex; align-items:center; gap:8px;">
                  <input type="checkbox" id="${prefix}-aplica-break" style="accent-color:var(--accent-primary); width:16px; height:16px; cursor:pointer;" ${tieneAlmuerzo} onchange="toggleBreakFields('${prefix}', ${index})"><label for="${prefix}-aplica-break" style="font-size:12px; font-weight:700; cursor:pointer; color:var(--accent-primary); user-select:none;">¿APLICAR ALMUERZO?</label>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;">
                  <input type="time" id="${prefix}-break-in" class="input-filtro" style="width:100%; box-sizing:border-box; transition: 0.3s; opacity: ${opacidadInicial};" value="${turno.breakIn || ''}" ${desactivadoInicial} onchange="autoCompletarAlmuerzo('${prefix}')"><input type="time" id="${prefix}-break-out" class="input-filtro" style="width:100%; box-sizing:border-box; transition: 0.3s; opacity: ${opacidadInicial};" value="${turno.breakOut || ''}" ${desactivadoInicial}>
                </div>
              </div>

              <div style="margin-top:15px;">
                <label style="font-size:12px; font-weight:700;">
                  NOTAS / OBSERVACIONES
                </label>
                <!-- Se quitan los espacios para que no se guarde con saltos de línea -->
                <textarea id="${prefix}-nota" class="input-filtro" style="width:100%; box-sizing:border-box; resize:vertical; min-height:60px; margin-top:5px; font-family:inherit;" placeholder="Añade una nota...">${turno.nota || ''}</textarea>
              </div>
            </div>`,
        showCancelButton: true,
        confirmButtonText: 'Guardar Cambios',
        cancelButtonText: 'Cancelar',
        preConfirm: () => {
            const tipo = document.getElementById(`${prefix}-tipo`).value;
            const notaValue = document.getElementById(`${prefix}-nota`).value;

            // Si es una excepción (Vacaciones, Ausencia, etc.)
            if (tipo !== "Normal") {
              return { 
                entrada: tipo, 
                salida: "",
                breakIn: "",
                breakOut: "",
                nota: notaValue
              };
            }
            
            // Si es turno normal
            const aplica = document.getElementById(`${prefix}-aplica-break`).checked;
            return { 
              entrada: document.getElementById(`${prefix}-entrada`).value,
              salida: document.getElementById(`${prefix}-salida`).value,
              breakIn: aplica ? document.getElementById(`${prefix}-break-in`).value : "",
              breakOut: aplica ? document.getElementById(`${prefix}-break-out`).value : "",
              nota: notaValue
            };
        }
      }).then((result) => {
        if (result.isConfirmed) {
          const turnoAct = { 
            id: turno.id, 
            entrada: result.value.entrada, 
            salida: result.value.salida, 
            breakIn: result.value.breakIn, 
            breakOut: result.value.breakOut,
            nota: result.value.nota
          };
          mostrarModalSincronizando('Guardando en Historial...');
          google.script.run.withSuccessHandler(function() {
            // Actualizamos la memoria local
            historialActual[index].entrada = turnoAct.entrada; 
            historialActual[index].salida = turnoAct.salida; 
            historialActual[index].breakIn = turnoAct.breakIn; 
            historialActual[index].breakOut = turnoAct.breakOut;
            historialActual[index].nota = turnoAct.nota; // <--- Actualizamos la nota localmente

            if (turno.fecha === document.getElementById('fechaFiltro').value) cargarHorarios();
            const bar = document.getElementById('loading-bar'); if (bar) { if (bar.dataset.intervalId) clearInterval(parseInt(bar.dataset.intervalId)); bar.style.width = '100%'; bar.style.background = 'var(--success)'; }
            setTimeout(() => { dibujarModalPerfil(turno.nombre); }, 350);
          }).withFailureHandler(manejarErrorServidor).actualizarTurnoExistente(turnoAct);
        } else { 
          dibujarModalPerfil(turno.nombre); 
        }
      });
    }

    // =========================================================
    // 🕹️ INICIALIZADOR DEL PANEL MÓVIL
    // =========================================================
    document.addEventListener("DOMContentLoaded", () => {
      // Cerrar panel al hacer clic fuera
      document.addEventListener("click", (e) => {
        const container = document.getElementById("assistive-container");
        const panel = document.getElementById("panel-comando-flotante");
        if (container && panel && panel.style.display !== "none") {
          if (!container.contains(e.target)) {
            panel.style.display = "none";
            container.classList.remove("open");
          }
        }
      });
    });

  // =========================================================
    // 🕹️ MOTOR ASISTIVO DE DESPLIEGUE
    // =========================================================

    function toggleAssistiveMenu(e) {
      const panel = document.getElementById("panel-comando-flotante");
      const container = document.getElementById("assistive-container");
      if (!panel || !container) return;

      if (panel.style.display === "none") {
        panel.style.display = "flex";
        container.classList.add("open");
      } else {
        panel.style.display = "none";
        container.classList.remove("open");
      }
    }

    // =========================================================
    // ⌨️ MOTOR DE ATAJOS DE TECLADO (HOTKEYS)
    // =========================================================
    function parseHotkeyEvent(e) {
      let keys = [];
      if (e.ctrlKey) keys.push('Ctrl');
      if (e.altKey) keys.push('Alt');
      if (e.shiftKey) keys.push('Shift');
      
      let keyName = e.key;
      if (keyName === ' ') keyName = 'Space';
      if (keyName.length === 1) keyName = keyName.toUpperCase();
      
      keys.push(keyName);
      return keys.join('+');
    }

    function initHotkeys() {
      const defaultHotkeys = {
        asignarTurno: 'Alt+N',
        iaSugerencia: 'Ctrl+I',
        reordenar: 'Alt+R',
        seleccion: 'Ctrl+M',
        diaAnterior: 'Ctrl+ArrowLeft',
        diaSiguiente: 'Ctrl+ArrowRight',
        copiar: 'Ctrl+C',
        pegar: 'Ctrl+V',
        limpiar: 'Ctrl+Backspace',
        menuFlotante: 'Ctrl+Space'
      };
      
      let configured = { ...defaultHotkeys };
      try {
        const saved = localStorage.getItem('appHotkeys');
        if (saved) {
          const parsed = JSON.parse(saved);
          Object.keys(defaultHotkeys).forEach(k => {
            if (parsed[k]) configured[k] = parsed[k];
          });
        }
      } catch(e) {}
      
      document.addEventListener('keydown', (e) => {
        // Ignorar si el usuario está escribiendo en un input, textarea o select (a menos que sea necesario)
        const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
        if (['input', 'textarea', 'select'].includes(activeTag) && !['Ctrl+Backspace'].includes(parseHotkeyEvent(e))) {
           // Allow copying/pasting text normally inside inputs
           if (parseHotkeyEvent(e) === 'Ctrl+C' || parseHotkeyEvent(e) === 'Ctrl+V' || parseHotkeyEvent(e) === 'Ctrl+A') return;
        }

        const combo = parseHotkeyEvent(e);
        
        switch (combo) {
          case configured.asignarTurno: e.preventDefault(); abrirModalNuevoHorario(); break;
          case configured.iaSugerencia: e.preventDefault(); typeof triggerSugerenciaMasiva === 'function' && triggerSugerenciaMasiva(); break;
          case configured.reordenar: e.preventDefault(); toggleModoOrden(); break;
          case configured.seleccion: e.preventDefault(); toggleModoSeleccion(); break;
          case configured.diaAnterior: e.preventDefault(); cambiarDia(-1); break;
          case configured.diaSiguiente: e.preventDefault(); cambiarDia(1); break;
          case configured.copiar: e.preventDefault(); copiarTurnosDia(); break;
          case configured.pegar: e.preventDefault(); pegarTurnosDia(); break;
          case configured.limpiar: e.preventDefault(); typeof confirmarLimpiezaDia === 'function' && confirmarLimpiezaDia(); break;
          case configured.menuFlotante: e.preventDefault(); toggleAssistiveMenu(); break;
        }
      });
    }

    document.addEventListener('DOMContentLoaded', initHotkeys);

  </script>
