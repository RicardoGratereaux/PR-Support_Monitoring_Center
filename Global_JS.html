<script>
// ===== GLOBAL CLICK POSITION TRACKER FOR MODAL ORIGIN ANIMATIONS =====
window.lastClickPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
document.addEventListener('click', function(e) {
  if (e.clientX !== undefined && e.clientY !== undefined && (e.clientX > 0 || e.clientY > 0)) {
    window.lastClickPos = { x: e.clientX, y: e.clientY };
  }
}, true);

// Observer to set transform-origin dynamically on all SweetAlert popups and custom modals
const modalOriginObserver = new MutationObserver((mutations) => {
  mutations.forEach((mutation) => {
    mutation.addedNodes.forEach((node) => {
      if (node.nodeType === 1) {
        let popup = null;
        if (node.classList && node.classList.contains('swal2-popup')) {
          popup = node;
        } else if (node.querySelector) {
          popup = node.querySelector('.swal2-popup') || node.querySelector('.modal-content');
        }
        if (popup && window.lastClickPos) {
          popup.style.transformOrigin = `${window.lastClickPos.x}px ${window.lastClickPos.y}px`;
          popup.classList.add('swal-origin-pop');
        }
      }
    });
  });
});

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    modalOriginObserver.observe(document.body, { childList: true, subtree: true });
  });
} else {
  modalOriginObserver.observe(document.body, { childList: true, subtree: true });
}

// ===== SWALERT2 CONFIGURATION =====
const SWAL_GLASS_CONFIG = {
  customClass: {
    backdrop: 'swal-glass-backdrop',
    popup: 'swal-glass-popup',
    title: 'swal-glass-title',
    htmlContainer: 'swal-glass-text',
    confirmButton: 'swal-glass-confirm'
  },
  buttonsStyling: false
};

// ===== TOAST NOTIFICATIONS =====
function mostrarToast(mensaje, icono) {
  Swal.fire({
    toast: true,
    position: 'top-end',
    icon: icono,
    title: mensaje,
    showConfirmButton: false,
    timer: 3000,
    timerProgressBar: true,
    background: 'rgba(17, 24, 39, 0.9)',
    color: '#fff'
  });
}

// ===== MODAL MANAGEMENT =====
function abrirModal(modalId) {
  const modal = document.getElementById(modalId);
  if (modal) {
    modal.style.display = "flex";
    const content = modal.querySelector('.modal-content');
    if (content && window.lastClickPos) {
      content.style.transformOrigin = `${window.lastClickPos.x}px ${window.lastClickPos.y}px`;
      content.classList.remove('animate-spring');
      void content.offsetWidth;
      content.classList.add('animate-spring');
    }
  }
}
function cerrarModal(modalId) {
  document.getElementById(modalId).style.display = "none";
}

// ===== DATE FORMATTING =====
function formatearFecha(fechaStr) {
  if (!fechaStr) return "";
  const d = new Date(fechaStr);
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' + 
         d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

// ===== LOADING OVERLAY =====
function mostrarCargando() {
  Swal.fire({
    ...SWAL_GLASS_CONFIG,
    title: 'Cargando...',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });
}
function ocultarCargando() {
  Swal.close();
}

// ===== SERVER CALL WRAPPER =====
function llamarServidor(nombreFuncion, ...args) {
  return new Promise((resolve, reject) => {
    const runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject);
    runner[nombreFuncion](...args);
  });
}

// ===== IMAGE COMPRESSION =====
function comprimirImagen(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = Math.round((height * maxWidth) / width);
          width = maxWidth;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => { resolve(blob); }, file.type, quality);
      };
    };
  });
}

// ===== THEMED AVATARS =====
function getAvatarUrl(nombre, foto) {
  if (foto && typeof foto === 'string' && foto.trim() !== "") return foto;
  
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const bg = isLight ? 'ccd0da' : '181825';
  const color = isLight ? '4c4f69' : 'cdd6f4';
  const safeName = nombre || "User";
  
  return "https://ui-avatars.com/api/?name=" + encodeURIComponent(safeName) + "&background=" + bg + "&color=" + color;
}
</script>
