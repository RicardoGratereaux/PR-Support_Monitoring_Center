<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Gestión de Horarios - Centro de Monitoreo</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <?!= include('Global_CSS'); ?>

  <?!= include('Horarios_CSS'); ?>
</head>

<body>

 

  <?!= include('Global_Navbar', 'horarios'); ?>

  <div class="content-container">
        <!-- TOOLBAR DE COMANDOS ESTÁTICO (MINIMALISTA) -->
    <div class="toolbar-horarios">
      
      <!-- Acción Principal -->
      <button id="btn-asignar-turno" class="toolbar-btn toolbar-btn-primary" onclick="abrirModalNuevoHorario()">
        <span class="material-symbols-outlined" style="font-size:18px;">add</span> Asignar Turno
      </button>
      
      <!-- Controles de Vista -->
      <button id="btn-modo-orden" class="toolbar-btn" onclick="toggleModoOrden()">
        <span class="material-symbols-outlined" style="font-size:18px;">swap_vert</span> Reordenar Lista
      </button>
      
      <button id="btn-modo-seleccion" class="toolbar-btn" onclick="toggleModoSeleccion()">
        <span class="material-symbols-outlined" style="font-size:18px;">checklist</span> Seleccionar Múltiple
      </button>
      
      <!-- Portapapeles del Día -->
      <button id="btn-copiar-dia" class="toolbar-btn" style="color:var(--success); border-color:rgba(166,227,161,0.2);" onclick="copiarTurnosDia()">
        <span class="material-symbols-outlined" style="font-size:18px;">content_copy</span> Copiar Turnos
      </button>
      
      <button id="btn-pegar-dia" class="toolbar-btn" style="color:var(--warning); border-color:rgba(249,226,175,0.2); display:none;" onclick="pegarTurnosDia()">
        <span class="material-symbols-outlined" style="font-size:18px;">content_paste</span> Pegar Turnos
      </button>
      
      <!-- Acciones Contextuales (Ocultas por defecto) -->
      <button id="btn-editar-masivo" class="toolbar-btn" style="color: var(--warning); border-color: rgba(249,226,175,0.2); display:none;" onclick="abrirModalEdicionMasiva()">
        <span class="material-symbols-outlined" style="font-size:18px;">edit_calendar</span> Cambiar Grupo
      </button>
      
      <button id="btn-eliminar-masivo" class="toolbar-btn" style="color: var(--danger); border-color: rgba(243,139,168,0.2); display:none;" onclick="ejecutarEliminacionMasiva()">
        <span class="material-symbols-outlined" style="font-size:18px;">delete</span> Eliminar Grupo (0)
      </button>

    </div>
      <div id="active-avatars" class="active-avatars-row"></div>
    </div>

    <div class="timeline-container">
      <div class="timeline-header-grid">
        <div style="padding-left:10px;">Colaborador</div>
        <div class="time-scale">
          <span style="left: 0%;">07:00</span><span style="left: calc((100% / 13) * 1);">08:00</span><span style="left: calc((100% / 13) * 2);">09:00</span><span style="left: calc((100% / 13) * 3);">10:00</span><span style="left: calc((100% / 13) * 4);">11:00</span><span style="left: calc((100% / 13) * 5);">12:00</span><span style="left: calc((100% / 13) * 6);">13:00</span><span style="left: calc((100% / 13) * 7);">14:00</span><span style="left: calc((100% / 13) * 8);">15:00</span><span style="left: calc((100% / 13) * 9);">16:00</span><span style="left: calc((100% / 13) * 10);">17:00</span><span style="left: calc((100% / 13) * 11);">18:00</span><span style="left: calc((100% / 13) * 12);">19:00</span><span style="left: 100%;">20:00</span>
        </div>
      </div>
      <div id="diagnosticoTrack"></div>
      <div id="contenedorRows"></div>
        <!-- LEYENDA, FECHA Y BUSCADOR (BARRA INFERIOR) -->
      <div class="legend" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border);">
        
        <!-- LADO IZQUIERDO: Viñetas de colores -->
        <div style="display: flex; gap: 20px; align-items: center;">
          <div class="legend-item">
            <div class="dot" style="background: var(--accent-primary);"></div> Horario Laboral
          </div>
          <div class="legend-item">
            <div class="dot" style="border: 1px dashed var(--danger); background: rgba(239,68,68,0.1); "></div> Almuerzo
          </div>
        </div>

        <!-- CENTRO: Navegador de Fechas + Buscador Integrado -->
        <div style="display: flex; align-items: center; gap: 20px;">
          
          <!-- Selector de Fecha -->
          <div style="display: flex; align-items: center; gap: 12px;">
            <div class="date-nav-group">
              <button class="btn-date-nav" onclick="cambiarDia(-1)" title="Día Anterior">
                <span class="material-symbols-outlined" style="font-size: 18px;">chevron_left</span>
              </button>
              <input type="date" id="fechaFiltro" class="input-date-seamless" onchange="cargarHorarios()">
              <button class="btn-date-nav" onclick="cambiarDia(1)" title="Día Siguiente">
                <span class="material-symbols-outlined" style="font-size: 18px;">chevron_right</span>
              </button>
            </div>
            <span id="dia-semana-toolbar" style="color: var(--accent-primary); font-size: 13px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase;"></span>
          </div>

          <!-- Divisor vertical sutil entre herramientas -->
          <div style="width: 1px; height: 20px; background: rgba(255, 255, 255, 0.1);"></div>

          <!-- Buscador de Colaboradores -->
          <input type="text" id="buscarColaborador" class="input-filtro" placeholder="Buscar colaborador..." oninput="filtrarTimeline()" style="width: 220px; padding: 8px 12px;">
        </div>

        <!-- LADO DERECHO: Texto de ayuda -->
        <div class="legend-item" style="color:var(--text-muted);">
          <i>💡 Haz clic en cualquier barra para editar</i>
        </div>

      </div>

      </div>
    </div>
  </div>

  <?!= include('Global_JS'); ?>
  <?!= include('Horarios_Core'); ?>
  <?!= include('Horarios_Advanced'); ?>
</body>

</html>
