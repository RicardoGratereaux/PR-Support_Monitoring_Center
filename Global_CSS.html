<style>
  html {
    scroll-behavior: smooth;
  }

  /* -------- GLOBAL RESET & LAYOUT -------- */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #050505;
    margin: 0;
    padding: 0;
    color: #e4e4e7;
  }

  /* BARRA SUPERIOR COMPACTA (GLASSMORPHISM) */
  .top-bar {
    background: rgba(17, 24, 39, 0.6) !important;
    /* Cristal oscuro */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(222, 255, 154, 0.1);
    /* Línea neón sutil */
    color: white;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 99;
    height: 30px;
  }

  .top-bar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    font-weight: 600;
    color: #f3f4f6;
  }

  /* BOTÓN HAMBURGUESA */
  .burger-btn {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 4px;
    border-radius: 4px;
    transition: all 0.3s ease;
  }

  .burger-btn:hover {
    color: #deff9a;
    /* Brilla en neón */
  }

  .burger-btn span {
    font-size: 24px;
  }

  /* MENÚ LATERAL (SIDENAV GLASSMORPHISM) */
  .sidenav {
    position: fixed;
    top: 0;
    bottom: 0;
    left: -280px;
    width: 280px;
    background: rgba(17, 24, 39, 0.65);
    /* Cristal oscuro */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid rgba(222, 255, 154, 0.15);
    /* Borde derecho neón */
    z-index: 100;
    transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    /* Animación más suave */
    box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
    padding-top: 20px;
    box-sizing: border-box;
  }

  .sidenav.open {
    left: 0;
  }

  .sidenav-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 20px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    margin-bottom: 15px;
    color: white;
  }

  .sidenav-title {
    font-size: 16px;
    font-weight: 700;
    color: #deff9a;
    /* Título en neón */
  }

  .close-sidenav-btn {
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 4px;
    border-radius: 4px;
    transition: all 0.3s ease;
  }

  .close-sidenav-btn:hover {
    color: #ef4444;
    transform: rotate(90deg);
    /* Cierre rojo con rotación */
  }

  /* ENLACES DEL SIDENAV */
  .sidenav-links {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0 10px;
  }

  .nav-link {
    color: #9ca3af;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s ease;
  }

  /* Hover en los enlaces */
  .nav-link:hover {
    color: #deff9a;
    background: rgba(222, 255, 154, 0.05);
    transform: translateX(5px);
    /* Se mueve un poco a la derecha */
  }

  /* Enlace Activo (Cambiado de Azul a Verde Neón) */
  .nav-link.active {
    color: #111827;
    /* Texto oscuro para contrastar */
    background: #deff9a;
    /* Fondo verde neón */
    font-weight: 600;
    box-shadow: 0 0 10px rgba(222, 255, 154, 0.3);
    /* Resplandor suave */
  }

  .nav-link span {
    font-size: 20px;
  }

  .text-muted {
    color: #6c757d !important; /* Standard Bootstrap gray tone */
  }

  /* CAPA OSCURA DE FONDO (OVERLAY) */
  .sidenav-overlay {
    display: none;
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 98;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .sidenav-overlay.show {
    display: block;
  }

  /* --- SCROLLBAR CUSTOM (Estilo Neón/Oscuro) --- */
  /* Ancho de la barra */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
    /* Para scroll horizontal si lo hay */
  }

  /* Fondo de la barra (track) */
  ::-webkit-scrollbar-track {
    background: #050505;
  }

  /* El "agarrador" de la barra (thumb) */
  ::-webkit-scrollbar-thumb {
    background: rgba(222, 255, 154, 0.3);
    /* Verde neón semitransparente */
    border-radius: 10px;
  }

  /* El "agarrador" cuando pasas el mouse */
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(222, 255, 154, 0.8);
    /* Se ilumina más al usarlo */
  }

  /* =========================================
   ESTILO GLOBAL PARA TODOS LOS SELECTS
   ========================================= */
  select {
    background-color: #0a0a0a;
    border: 1px solid #27272a;
    color: #e4e4e7;
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    transition: all 0.3s ease;
    box-sizing: border-box;
    padding: 10px 35px 10px 16px;
    cursor: pointer;

    /* Quita el estilo por defecto del sistema operativo */
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    /* Flecha (Chevron) personalizada */
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23a1a1aa%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right 14px top 50%;
    background-size: 10px auto;
  }

  /* Opciones del desplegable en oscuro */
  select option {
    background-color: #111111;
    color: #e4e4e7;
  }

  /* Efecto Neón al pasar el mouse o hacer foco (Sin mover el chevron) */
  select:focus,
  select:hover {
    border-color: #deff9a;
    box-shadow: 0 0 8px rgba(222, 255, 154, 0.15);
    background-color: #111111;
  }

/* --- ESTILOS PARA EL MODAL DE SWEETALERT2 (Glassmorphism Transparente) --- */

.swal2-success-circular-line-left,
