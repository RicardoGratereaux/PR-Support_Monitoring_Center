<script>
function openSidenav() {
  document.getElementById("mySidenav").classList.add("open");
  document.getElementById("sidenavOverlay").classList.add("show");
}

function closeSidenav() {
  document.getElementById("mySidenav").classList.remove("open");
  document.getElementById("sidenavOverlay").classList.remove("show");
}
</script>
<script>
// Theme Management
function initTheme() {
  const savedTheme = localStorage.getItem('pr_theme');
  if (savedTheme === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('theme-icon').innerText = 'dark_mode';
    document.getElementById('theme-text').innerText = 'Modo Oscuro';
  }
}

function toggleTheme() {
  const body = document.body;
  const isLight = body.classList.toggle('light-mode');
  
  if (isLight) {
    localStorage.setItem('pr_theme', 'light');
    document.getElementById('theme-icon').innerText = 'dark_mode';
    document.getElementById('theme-text').innerText = 'Modo Oscuro';
  } else {
    localStorage.setItem('pr_theme', 'dark');
    document.getElementById('theme-icon').innerText = 'light_mode';
    document.getElementById('theme-text').innerText = 'Modo Claro';
  }
}

// Ensure theme is set immediately on load
initTheme();
</script>
