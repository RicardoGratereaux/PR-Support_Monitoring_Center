  <script>
    
let reportesGlobales = [];
let archivosAEliminarDrive = []; 
let archivosNuevosSeleccionados = []; 
let listaArchivosViejosHTML = []; 

document.addEventListener("DOMContentLoaded", cargarMisReportes);

function cargarMisReportes() {
  google.script.run
    .withSuccessHandler(res => {
      reportesGlobales = JSON.parse(res);
      const tbody = document.querySelector("#tablaMisReportes tbody");
      tbody.innerHTML = reportesGlobales.length ? "" : `<tr><td colspan="8" style="text-align:center; padding: 20px; color: #6b7280;">No tienes reportes activos (Los aprobados se archivan).</td></tr>`;

      reportesGlobales.forEach(r => {
        let estadoClass = r.estado.toLowerCase() === "rechazado" ? "badge-rechazado" : "badge-pendiente";
        let botonAccion = r.estado.toLowerCase() === "rechazado" ? 
          `<button class="btn-icon btn-editar" onclick="abrirModalEdicion('${r.id}')"><span class="material-symbols-outlined">edit</span> Corregir</button>` : 
          `<button class="btn-icon btn-disabled" disabled><span class="material-symbols-outlined">lock</span> En Revisión</button>`;

        tbody.innerHTML += `
          <tr>
            <td><strong>${r.id}</strong></td>
            <td>${r.fecha}</td>
            <td><span style="font-weight:600;">${r.empresa.charAt(0).toUpperCase() + r.empresa.slice(1)}</span></td>
            <td>${r.tienda}</td>
            <td>${r.tipoReporte}</td>
            <td>${r.empleado}</td>
            <td><span class="badge ${estadoClass}">${r.estado}</span></td>
            <td>${botonAccion}</td>
          </tr>`;
      });
    }).getMisReportes();
}

function cargarTiendas(tiendaPreseleccionada = "") {
  const empresa = document.getElementById("empresa").value;
  const selectTienda = document.getElementById("tienda");
  selectTienda.innerHTML = '<option value="">Seleccione una tienda</option>';
  document.getElementById("posicion").value = ""; 
  if(!empresa) return;

    let opt = document.createElement("option"); opt.value = item; opt.textContent = item; selectTienda.appendChild(opt);
  });
  if(tiendaPreseleccionada) { selectTienda.value = tiendaPreseleccionada; actualizarPosicion('editTienda', 'editPosicion'); }
}

document.getElementById("empleado").addEventListener("input", function() {
  const nombre = this.value.trim();
  const campo = document.getElementById("iniciales");
  campo.value = nombre ? nombre.split(/\s+/).map(p => p.charAt(0).toUpperCase()).join("").substring(0, 4) : "";
});

function abrirModalEdicion(id) {
  const r = reportesGlobales.find(item => item.id === id);
  if(!r) return;

  document.getElementById("idReporteOculto").value = r.id;
  document.getElementById("idEdicionTexto").innerText = r.id;
  document.getElementById("cajaRechazo").innerHTML = `<strong>Motivo de rechazo:</strong> ${r.observacionSupervisor || "Revisar observaciones."}`;
  document.getElementById("empresa").value = r.empresa.toLowerCase();
  cargarTiendas(r.tienda);
  
  document.getElementById("tipoReporte").value = r.tipoReporte;
  document.getElementById("empleado").value = r.empleado;
  document.getElementById("iniciales").value = r.iniciales;
  document.getElementById("observaciones").value = r.observaciones;

  archivosAEliminarDrive = []; archivosNuevosSeleccionados = [];
  listaArchivosViejosHTML = r.archivos || [];
  
  renderizarArchivosViejos(); renderizarListaArchivosNuevos();
  document.getElementById("modalEdicion").style.display = "flex";
}

function cerrarModal() { document.getElementById("modalEdicion").style.display = "none"; }

function renderizarArchivosViejos() {
  const cont = document.getElementById("lista-archivos-viejos"); cont.innerHTML = "";
  let contadores = 0;
  listaArchivosViejosHTML.forEach(a => {
    if (!archivosAEliminarDrive.includes(a.id)) {
      contadores++;
      cont.innerHTML += `
        <div class="archivo-item">
          <span><a href="${a.url}" target="_blank">📎 ${a.name}</a></span>
          <button type="button" class="btn-eliminar-archivo" onclick="marcarBorradoViejo('${a.id}')"><span class="material-symbols-outlined">delete</span></button>
        </div>`;
    }
  });
  if(!contadores) cont.innerHTML = `<div style="font-size:12px; color:#9ca3af; padding:6px 0;">No se conservarán archivos anteriores.</div>`;
}
function marcarBorradoViejo(id) { archivosAEliminarDrive.push(id); renderizarArchivosViejos(); }

function manejarSeleccionArchivos() {
  const input = document.getElementById("files");
  for (let i = 0; i < input.files.length; i++) { archivosNuevosSeleccionados.push(input.files[i]); }
  input.value = ""; renderizarListaArchivosNuevos();
}

function renderizarListaArchivosNuevos() {
  const lista = document.getElementById("lista-archivos-nuevos");
  const counter = document.getElementById("file-counter");
  counter.textContent = archivosNuevosSeleccionados.length ? ` ${archivosNuevosSeleccionados.length} archivo(s) nuevos listos` : "Ningún archivo nuevo seleccionado";
  archivosNuevosSeleccionados.length ? counter.classList.add("has-files") : counter.classList.remove("has-files");
  
  lista.innerHTML = "";
  archivosNuevosSeleccionados.forEach((a, i) => {
    lista.innerHTML += `
      <div class="archivo-item" style="border-color: var(--accent-glow);">
        <span> ${a.name}</span>
        <button type="button" class="btn-eliminar-archivo" onclick="eliminarNuevo(${i})"><span class="material-symbols-outlined">close</span></button>
      </div>`;
  });
}
function eliminarNuevo(i) { archivosNuevosSeleccionados.splice(i, 1); renderizarListaArchivosNuevos(); }

function guardarCorreccion() {
  const id = document.getElementById("idReporteOculto").value;
  const datos = {
    empresa: document.getElementById("empresa").value,
    tienda: document.getElementById("tienda").value,
    posicion: document.getElementById("posicion").value,
    tipoReporte: document.getElementById("tipoReporte").value,
    empleado: document.getElementById("empleado").value,
    iniciales: document.getElementById("iniciales").value,
    observaciones: document.getElementById("observaciones").value
  };

  
  if(!datos.empresa || !datos.tienda) { 
    Swal.fire({ ...SWAL_GLASS_CONFIG, title: 'Atención', text: 'Campos requeridos vacíos.', icon: 'warning' }); 
    return; 
  }

  const tienePDFNuevo = archivosNuevosSeleccionados.some(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  const tienePDFViejo = listaArchivosViejosHTML.some(a => !archivosAEliminarDrive.includes(a.id) && a.name.toLowerCase().endsWith('.pdf'));
  
  if (!tienePDFNuevo && !tienePDFViejo) {
    Swal.fire({ ...SWAL_GLASS_CONFIG, title: 'Falta Evidencia', text: 'El reporte debe contener obligatoriamente el PDF de Smartsheet.', icon: 'error' }); 
    return;
  }

  Swal.fire({ 
    title: 'Actualizando reporte...', 
    allowOutsideClick: false, 
    didOpen: () => Swal.showLoading(),
    ...SWAL_GLASS_CONFIG
  });

  let fileData = [];
  if (archivosNuevosSeleccionados.length === 0) {
    enviarCorreccionServidor(id, datos, [], archivosAEliminarDrive);
  } else {
    let links = 0;
    for (let i = 0; i < archivosNuevosSeleccionados.length; i++) {
      let reader = new FileReader();
      reader.onload = e => {
        fileData.push({ name: archivosNuevosSeleccionados[i].name, type: archivosNuevosSeleccionados[i].type, data: e.target.result.split(",")[1] });
        links++;
        if (links === archivosNuevosSeleccionados.length) { 
          enviarCorreccionServidor(id, datos, fileData, archivosAEliminarDrive); 
        }
      };
      reader.readAsDataURL(archivosNuevosSeleccionados[i]);
    }
  }
}

function enviarCorreccionServidor(id, datos, files, borrarViejos) {
  
  google.script.run
    .withSuccessHandler(res => {
      if(res.success) {
        cerrarModal(); 
        Swal.fire({
          ...SWAL_GLASS_CONFIG,
          title: '¡Éxito!',
          text: 'Reporte corregido y reenviado al Supervisor.',
          icon: 'success'
        }).then(() => cargarMisReportes());
      } else { 
        Swal.fire({ ...SWAL_GLASS_CONFIG, title: 'Error', text: res.message, icon: 'error' }); 
      }
    })
    .corregirReporteMonitor(id, datos, files, borrarViejos);
}
